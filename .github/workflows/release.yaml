name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'prefix.dev channel name'
        required: false
        default: 'alvgaona'

env:
  PREFIX_CHANNEL: ${{ github.event.inputs.channel || 'alvgaona' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: osx-arm64
          - os: ubuntu-latest
            platform: linux-64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.platform }})
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Build conda package
        run: pixi build --output-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: conda-${{ matrix.platform }}
          path: dist/*.conda
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Authenticate with prefix.dev
        run: pixi auth login prefix.dev --token "$PREFIX_API_KEY"
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}

      - name: Upload packages to prefix.dev
        run: |
          set -euo pipefail
          for f in dist/*.conda; do
            echo "Uploading $f"
            pixi upload "https://prefix.dev/api/v1/upload/${PREFIX_CHANNEL}" "$f"
          done
